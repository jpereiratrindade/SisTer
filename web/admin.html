<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#071e38">
    <title>Equipe · SisTer</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/auth.css">
  </head>
  <body class="admin-page">
    <main class="admin-wrap">
      <header class="admin-head">
        <div>
          <span class="eyebrow">ADMINISTRAÇÃO DO SISTER</span>
          <h1>Equipe e permissões</h1>
          <p>Cadastre as pessoas e defina quem pode acessar as visões administrativas.</p>
        </div>
        <a href="/">← Voltar ao SisTer</a>
      </header>

      <div class="admin-grid">
        <section class="admin-card">
          <span class="section-kicker">Nova identidade</span>
          <h2>Cadastrar pessoa</h2>
          <form id="user-form">
            <label>Nome<input name="name" required minlength="2" autocomplete="name"></label>
            <label>E-mail<input name="email" type="email" required autocomplete="email"></label>
            <label>Senha temporária<input name="password" type="password" required minlength="12" autocomplete="new-password"></label>
            <label>
              Papel
              <select name="role">
                <option value="user">Usuário</option>
                <option value="admin">Administrador</option>
              </select>
            </label>
            <button type="submit">Criar acesso</button>
            <p class="admin-message" id="admin-message" role="status"></p>
          </form>
        </section>

        <section class="admin-card">
          <div class="admin-card-head">
            <div>
              <span class="section-kicker">Identidades cadastradas</span>
              <h2>Equipe</h2>
            </div>
            <span class="status-pill" id="user-count">0 pessoas</span>
          </div>
          <div class="table-wrap admin-table-wrap">
            <table class="user-table">
              <thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th></tr></thead>
              <tbody id="users"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
